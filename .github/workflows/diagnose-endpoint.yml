name: Diagnose patch endpoint

on:
  workflow_dispatch:
    inputs:
      use_secret:
        description: 'true = test PATCH_SERVER_ENDPOINT, false = test fallback socket'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      manual_endpoint:
        description: 'optional TCG patch server endpoint'
        required: false
        default: ''

jobs:
  diagnose:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: pnpm

      - run: pnpm i

      - name: Check patch info
        shell: pwsh
        env:
          USE_SECRET: ${{ inputs.use_secret }}
          SECRET_ENDPOINT: ${{ secrets.PATCH_SERVER_ENDPOINT }}
          MANUAL_ENDPOINT: ${{ inputs.manual_endpoint }}
        run: |
          if ($env:USE_SECRET -eq 'true') {
            if (-not [string]::IsNullOrWhiteSpace($env:MANUAL_ENDPOINT)) {
              $env:PATCH_SERVER_ENDPOINT = $env:MANUAL_ENDPOINT
              Write-Host "MODE=MANUAL_TCG_ENDPOINT"
            } elseif (-not [string]::IsNullOrWhiteSpace($env:SECRET_ENDPOINT)) {
              $env:PATCH_SERVER_ENDPOINT = $env:SECRET_ENDPOINT
              Write-Host "MODE=SECRET"
            } else {
              throw "No PATCH_SERVER_ENDPOINT provided."
            }
          } else {
            $env:PATCH_SERVER_ENDPOINT = ''
            Write-Host "MODE=FALLBACK_SOCKET"
          }

          pnpm start-check